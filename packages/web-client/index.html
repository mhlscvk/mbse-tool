<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Systemodel — SysML v2 Modeling Platform</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; width: 100%; overflow: hidden; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1e1e1e; color: #d4d4d4; transition: background 0.2s, color 0.2s; }
      body.theme-light { background: #ffffff; color: #1e1e1e; }
    </style>
    <script>
      // Apply stored theme before first paint to avoid flash
      try {
        var stored = JSON.parse(localStorage.getItem('systemodel-theme') || '{}');
        if (stored.state && stored.state.mode === 'light') document.body.classList.add('theme-light');
      } catch(e) { /* malformed JSON — use default dark */ }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
