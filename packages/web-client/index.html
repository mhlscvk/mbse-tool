<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Systemodel — SysML v2 Modeling Platform</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      input, textarea, [contenteditable] { caret-color: #000; }
      html, body, #root { height: 100%; width: 100%; overflow: hidden; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #ffffff; color: #1e1e1e; }
      /* Monaco cursor — always black, never white */
      .monaco-editor .cursors-layer .cursor,
      .monaco-editor .cursors-layer .cursor.cursor-primary,
      .monaco-editor .cursors-layer .cursor.cursor-secondary {
        background: #000 !important;
        border-color: #000 !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
