name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-types
        run: pnpm --filter @systemodel/shared-types build

      - name: Run api-server tests
        run: pnpm --filter @systemodel/api-server test

      - name: Run diagram-service tests
        run: pnpm --filter @systemodel/diagram-service test

      - name: Run web-client tests
        run: pnpm --filter @systemodel/web-client test

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: |
          pnpm --filter @systemodel/shared-types build
          cd packages/api-server && npx tsc --noEmitOnError false 2>/dev/null; cd ../..
          pnpm --filter @systemodel/diagram-service build
          pnpm --filter @systemodel/web-client build
